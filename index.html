<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendBook App Download</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* News Ticker Style */
        .ticker-wrap {
            position: relative;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, #3a0000 0%, #000000 40%, #1a0000 60%, #4a0000 100%);
            border-bottom: 2px solid #333;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-static {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: #d32f2f;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            padding: 0 15px;
            display: flex;
            align-items: center;
            z-index: 10;
            box-shadow: 5px 0px 10px rgba(0,0,0,0.6);
        }

        .running-text {
            white-space: nowrap;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            position: absolute;
            z-index: 1;
            padding-left: 100%;
            animation: scroll-left 20s linear infinite;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* App Cards - Strictly Side-by-Side */
        .download-container {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: center;
            gap: 15px;
            padding: 30px 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .app-card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            width: 48%;
            box-sizing: border-box;
            border: 1px solid #333;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .app-card:hover {
            border-color: #d32f2f;
            box-shadow: 0 15px 40px rgba(211, 47, 47, 0.2);
        }

        .app-logo {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            object-fit: cover;
            margin: 0 auto 15px auto;
            display: block;
            border: 2px solid #333;
        }

        .app-title {
            font-size: 18px;
            margin: 0 0 5px 0;
            font-weight: 700;
        }

        .app-version {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
            color: #fff;
            text-decoration: none;
            padding: 10px 0;
            width: 100%;
            border-radius: 50px;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
        }

        .lite-btn {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
        }

        .download-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.03);
        }

        /* Video Section - Centered below cards */
        .video-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
            margin-top: 10px;
        }

        .video-instruction {
            font-size: 16px;
            color: #ff5252;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .promo-video {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            border: 2px solid #333;
        }

        @media (min-width: 600px) {
            .app-card { padding: 30px 20px; }
            .app-logo { width: 85px; height: 85px; }
            .app-title { font-size: 24px; }
            .app-version { font-size: 14px; margin-bottom: 25px; }
            .download-btn { font-size: 16px; padding: 14px 0; }
            .promo-video { width: 350px; height: 350px; }
            .video-instruction { font-size: 18px; }
        }
    </style>
</head>
